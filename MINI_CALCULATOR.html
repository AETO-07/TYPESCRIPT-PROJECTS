<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINI CALCULATOR</title>
    <link rel="stylesheet" href="MINI_CALCULATOR.css">
</head>
<body>
    <h2>MINI Calculator</h2>
    <div class="calculator">
        <input type="number" id="firstnum" placeholder="First number">
        <input type="number" id="secondnum" placeholder="Second number">
        <div class="buttons">
            <button id="add">+</button>
            <button id="minus">-</button>
            <button id="product">*</button>
            <button id="divide">/</button>
            <button id="clear" class="clear">C</button>
        </div>
        <p id="result"></p>
    </div>
    <script type="module" src="./dist/Mini_calculator.js"></script>
</body>
</html>
